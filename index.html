<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة الفلسفة والأسطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="bg"></canvas>

    <header>
        <div class="header-container">
            <h1>موسوعة الفلسفة والأسطورة</h1>
            <p class="subtitle">رحلة في أعماق العقل البشري والقصص الخالدة</p>
        </div>
    </header>

    <nav id="main-nav">
        <button class="nav-btn" onclick="filterCategory('metaphysics')">الميتافيزيقا</button>
        <button class="nav-btn" onclick="filterCategory('logic')">المنطق</button>
        <button class="nav-btn" onclick="filterCategory('epistemology')">الإبستمولوجيا</button>
        <button class="nav-btn" onclick="filterCategory('Axiology')">الأكسيولوجيا</button>
    </nav>

    <main class="wrapper">
        <div id="content-grid">
            </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()" title="إغلاق">&times;</span>
            
            <div id="full-article" class="story-container"></div>
            
            <div class="comments-section">
                <h3>التعليقات والمناقشات</h3>
                <div id="comments-list"></div>
                
                <div class="comment-form">
                    <h4 id="replying-to" style="display:none; color:#d4af37; margin-bottom:10px;">الرد على تعليق <span onclick="cancelReply()" style="cursor:pointer; color:#ef4444; font-size:12px;">(إلغاء)</span></h4>
                    <input type="hidden" id="current-story-id">
                    <input type="hidden" id="parent-comment-id" value="">
                    
                    <input type="text" id="comment-name" placeholder="اسمك الكريم..." required>
                    <textarea id="comment-text" rows="3" placeholder="أضف أفكارك أو تحليلك هنا..." required></textarea>
                    <button onclick="submitComment()">نشر التعليق</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
